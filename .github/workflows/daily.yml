name: 🔄 Daily Contest Update

on:
  schedule:
    - cron: '0 1 * * *'   # UTC 01:00 = KST 10:00
  workflow_dispatch:

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ✅ 1. 먼저 체크아웃 (저장소 받아오기)
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ✅ 2. Java 설치
      - name: ☕ Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # ✅ 3. Maven 빌드
      - name: 🔨 Build with Maven
        run: mvn package -q

      # ✅ 4. 크롤러 실행 (contests.json 갱신됨)
      - name: 🕷️ Run Crawler
        run: |
          java -jar target/contest-crawler-1.0-SNAPSHOT-jar-with-dependencies.jar
          if [ ! -s output/index.html ]; then
            echo "❌ 크롤링 실패 또는 결과 없음"
            exit 1
          fi

      # ✅ 5. contests.json을 main 브랜치에 저장 (누적 DB 유지)
      - name: 💾 Save contests.json to main branch
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add output/contests.json
          git diff --staged --quiet || git commit -m "📦 Update contests.json"
          git push

      # ✅ 6. index.html을 GitHub Pages에 배포
      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          commit_message: "🔄 Daily update - ${{ github.run_id }}"
