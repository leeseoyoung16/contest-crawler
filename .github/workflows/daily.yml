name: 🔄 Daily Contest Update

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 한국시간 오전 9시 (UTC 00:00)
  workflow_dispatch:        # 수동 실행 버튼도 활성화

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 2. Java 설치
      - name: ☕ Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # 3. Maven으로 빌드
      - name: 🔨 Build with Maven
        run: mvn package -q

      # 4. 크롤러 실행 → output/index.html 생성
      - name: 🕷️ Run Crawler
        run: java -jar target/contest-crawler-1.0-SNAPSHOT-jar-with-dependencies.jar

      # 5. 생성된 index.html을 gh-pages 브랜치에 배포
      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          commit_message: "🔄 Daily update - ${{ github.run_id }}"
