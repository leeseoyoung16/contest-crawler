<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>개발자 공모전 정보</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background:#f0f4f8; color:#2d3748; }
    header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color:white; padding:40px 20px; text-align:center; }
    header h1 { font-size:2rem; margin-bottom:8px; }
    header p { font-size:1rem; opacity:0.85; }
    .badge { display:inline-block; background:rgba(255,255,255,0.25); padding:4px 14px; border-radius:20px; font-size:0.85rem; margin-top:10px; }
    .container { max-width:1100px; margin:30px auto; padding:0 20px; }
    .stats { background:white; border-radius:12px; padding:20px 30px; margin-bottom:24px; box-shadow:0 2px 8px rgba(0,0,0,0.07); font-size:1.1rem; font-weight:600; color:#4a5568; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px,1fr)); gap:20px; }
    .card { background:white; border-radius:12px; padding:22px; box-shadow:0 2px 8px rgba(0,0,0,0.07); border-left:4px solid #667eea; transition:transform 0.2s; }
    .card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,0.12); }
    .card-title { font-size:1rem; font-weight:700; color:#2d3748; margin-bottom:12px; line-height:1.4; }
    .card-title a { color:inherit; text-decoration:none; }
    .card-title a:hover { color:#667eea; }
    .info-row { font-size:0.85rem; color:#718096; margin-bottom:6px; }
    .tag { display:inline-block; background:#ebf4ff; color:#3182ce; padding:2px 10px; border-radius:12px; font-size:0.78rem; font-weight:600; margin-bottom:10px; }
    .deadline { background:#fff5f5; color:#e53e3e; padding:4px 10px; border-radius:8px; font-size:0.82rem; font-weight:600; }
    .empty { text-align:center; padding:60px; color:#a0aec0; font-size:1.1rem; }
    footer { text-align:center; padding:40px 20px; color:#a0aec0; font-size:0.85rem; }
    footer a { color:#667eea; text-decoration:none; }
  </style>
</head>
<body>
<header>
  <h1>개발자 공모전 정보</h1>
  <p>IT/SW/AI 관련 공모전을 매일 자동 수집합니다</p>
  <div class="badge">매일 자동 업데이트</div>
</header>
<div class="container">
  <div class="stats">
    2026년 03월 04일 기준 &nbsp;|&nbsp; 총 <span style="color:#667eea">0</span>개 개발자 공모전
  </div>
  <div class="empty">오늘은 수집된 개발자 공모전이 없습니다.</div>
</div>
<footer>
  <p>데이터 출처: <a href="https://www.contestkorea.com" target="_blank">공모전코리아</a> &nbsp;|&nbsp; 매일 오전 9시 자동 업데이트</p>
</footer>
</body>
</html>
